<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetScope — Cisco Topology Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a22; --surface2: #1e2430;
    --border: rgba(99,183,255,0.15); --accent: #63b7ff; --accent2: #00e5c0;
    --warn: #ffb347; --danger: #ff6b6b; --text: #e8edf5; --muted: #6b7a96;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
  .logo span { color: var(--accent2); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.active { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .status-text { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .main { display: grid; grid-template-columns: 340px 1fr; overflow: hidden; }
  .panel { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  textarea { width: 100%; height: 220px; resize: none; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 11px; line-height: 1.6; padding: 10px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; margin-top: 10px; }
  .btn:hover { background: rgba(99,183,255,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.loading { border-color: var(--accent2); color: var(--accent2); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .node-info { flex: 1; overflow-y: auto; padding: 16px; }
  .info-placeholder { color: var(--muted); font-size: 12px; font-family: var(--mono); text-align: center; padding-top: 24px; line-height: 1.9; }
  .device-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .device-name { font-family: var(--mono); font-size: 13px; color: var(--accent); margin-bottom: 8px; }
  .iface-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-top: 1px solid rgba(255,255,255,0.04); gap: 6px; }
  .iface-name { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .iface-ip { font-family: var(--mono); font-size: 11px; color: var(--text); }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-family: var(--mono); }
  .badge-trunk { background: rgba(99,183,255,0.15); color: var(--accent); }
  .badge-access { background: rgba(0,229,192,0.12); color: var(--accent2); }
  .badge-router { background: rgba(255,179,71,0.15); color: var(--warn); }
  .graph-area { position: relative; background: radial-gradient(ellipse at 20% 50%, rgba(99,183,255,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(0,229,192,0.03) 0%, transparent 50%), var(--bg); }
  #cy { width: 100%; height: 100%; }
  .graph-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; pointer-events: none; }
  .graph-empty.hidden { display: none; }
  .empty-icon { font-size: 40px; opacity: 0.2; }
  .empty-text { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: center; line-height: 1.9; }
  .legend { position: absolute; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: none; gap: 12px; flex-direction: column; }
  .legend.visible { display: flex; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .error-bar { display: none; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: var(--danger); font-family: var(--mono); font-size: 11px; padding: 8px 12px; border-radius: 6px; margin-top: 8px; line-height: 1.5; }
  .error-bar.visible { display: block; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">NET<span>SCOPE</span></div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">pronto</span>
    </div>
  </header>
  <div class="main">
    <div class="panel">
      <div class="panel-section">
        <div class="panel-label">// incolla config</div>
        <textarea id="configInput" placeholder="hostname Router1
!
interface GigabitEthernet0/0
 description WAN_UPLINK
 ip address 10.0.0.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description TO_SWITCH
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
router ospf 1
 network 10.0.0.0 0.0.0.255 area 0"></textarea>
        <div class="error-bar" id="errorBar"></div>
        <button class="btn" id="analyzeBtn" onclick="analyzeConfig()">[ ANALIZZA E VISUALIZZA ]</button>
      </div>
      <div class="node-info" id="nodeInfo">
        <div class="info-placeholder">← incolla una config<br>e premi analizza<br><br>clicca un nodo<br>per i dettagli</div>
      </div>
    </div>
    <div class="graph-area">
      <div id="cy"></div>
      <div class="graph-empty" id="graphEmpty">
        <div class="empty-icon">◈</div>
        <div class="empty-text">il grafo apparirà qui<br>dopo l'analisi</div>
      </div>
      <div class="legend" id="legend">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.1em">LEGENDA</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffb347"></div>router</div>
        <div class="legend-item"><div class="legend-dot" style="background:#63b7ff"></div>switch L3</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00e5c0"></div>switch L2</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>firewall</div>
      </div>
    </div>
  </div>
</div>
<script>
let cy = null;

function initCy(elements) {
  if (cy) cy.destroy();
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: elements,
    style: [
      { selector: 'node', style: {
        'background-color': 'data(color)', 'label': 'data(label)',
        'color': '#e8edf5', 'font-size': '11px', 'font-family': 'Space Mono, monospace',
        'text-valign': 'bottom', 'text-halign': 'center', 'text-margin-y': '6px',
        'width': '44px', 'height': '44px',
        'border-width': '2px', 'border-color': 'data(borderColor)', 'border-opacity': 0.6,
        'text-outline-width': 2, 'text-outline-color': '#0d0f14'
      }},
      { selector: 'node:selected', style: { 'border-width': '3px', 'border-opacity': 1, 'border-color': '#fff' }},
      { selector: 'edge', style: {
        'width': 1.5, 'line-color': 'rgba(99,183,255,0.3)', 'curve-style': 'bezier',
        'label': 'data(label)', 'font-size': '9px', 'font-family': 'Space Mono, monospace',
        'color': '#6b7a96', 'text-outline-width': 2, 'text-outline-color': '#0d0f14', 'text-rotation': 'autorotate'
      }}
    ],
    layout: { name: 'cose', idealEdgeLength: 140, nodeOverlap: 30, padding: 50, animate: true }
  });
  cy.on('tap', 'node', evt => showNodeDetails(evt.target.data()));
  cy.on('tap', evt => { if (evt.target === cy) clearNodeDetails(); });
}

// *** DIFFERENZA CHIAVE rispetto alla versione Claude ***
// Invece di chiamare https://api.anthropic.com direttamente,
// chiamiamo /api/analyze — la nostra Azure Function.
// Il browser parla con il nostro server, il server parla con Anthropic.
async function analyzeConfig() {
  const config = document.getElementById('configInput').value.trim();
  if (!config) return;

  const btn = document.getElementById('analyzeBtn');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const errorBar = document.getElementById('errorBar');

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '[ ANALISI IN CORSO... ]';
  dot.classList.add('active');
  statusText.textContent = 'chiamata API...';
  errorBar.classList.remove('visible');

  try {
    // Chiamata alla NOSTRA Azure Function (non ad Anthropic direttamente)
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${res.status}`);
    }

    const parsed = await res.json();
    const elements = toCyElements(parsed);

    document.getElementById('graphEmpty').classList.add('hidden');
    document.getElementById('legend').classList.add('visible');
    initCy(elements);

    dot.classList.remove('active');
    dot.style.background = '#00e5c0';
    statusText.textContent = `${parsed.devices?.length || 0} device · ${parsed.links?.length || 0} link`;

  } catch (err) {
    errorBar.textContent = `errore: ${err.message}`;
    errorBar.classList.add('visible');
    dot.classList.remove('active');
    dot.style.background = '#ff6b6b';
    statusText.textContent = 'errore';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '[ ANALIZZA E VISUALIZZA ]';
  }
}

function toCyElements(parsed) {
  const colors = {
    router:    { bg: '#ffb347', border: '#ffd700' },
    switch_l3: { bg: '#63b7ff', border: '#a0d4ff' },
    switch_l2: { bg: '#00e5c0', border: '#00ffcc' },
    firewall:  { bg: '#a78bfa', border: '#c4b5fd' }
  };
  const els = [];
  (parsed.devices || []).forEach(d => {
    const c = colors[d.type] || colors.switch_l2;
    els.push({ data: { id: d.id, label: d.hostname, type: d.type, color: c.bg, borderColor: c.border, interfaces: d.interfaces || [], routing: d.routing || 'none', hostname: d.hostname }});
  });
  (parsed.links || []).forEach((l, i) => {
    els.push({ data: { id: `e${i}`, source: l.source, target: l.target, label: l.label || '' }});
  });
  return els;
}

function showNodeDetails(d) {
  let html = `<div class="device-card">
    <div class="device-name">⬡ ${d.hostname}</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <span class="badge badge-router">${d.type}</span>
      ${d.routing !== 'none' ? `<span class="badge badge-trunk">routing: ${d.routing}</span>` : ''}
    </div>`;
  if (d.interfaces && d.interfaces.length > 0) {
    html += `<div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.1em;margin-bottom:6px">INTERFACCE</div>`;
    d.interfaces.forEach(ifc => {
      html += `<div class="iface-row">
        <span class="iface-name">${ifc.name}</span>
        <div style="display:flex;align-items:center;gap:5px">
          ${ifc.ip ? `<span class="iface-ip">${ifc.ip}</span>` : ''}
          ${ifc.type ? `<span class="badge badge-${ifc.type === 'trunk' ? 'trunk' : 'access'}">${ifc.type}</span>` : ''}
        </div>
      </div>`;
      if (ifc.description) html += `<div style="font-size:10px;color:var(--muted);font-family:var(--mono);padding:1px 0 4px">${ifc.description}</div>`;
    });
  }
  html += '</div>';
  document.getElementById('nodeInfo').innerHTML = html;
}

function clearNodeDetails() {
  document.getElementById('nodeInfo').innerHTML = '<div class="info-placeholder">← clicca un nodo<br>per i dettagli</div>';
}
</script>
</body>
</html>
