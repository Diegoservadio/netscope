# =========================================================
# GITHUB ACTIONS — deploy automatico su Azure
#
# COSA FA (spiegato semplice):
# Ogni volta che fai "git push" su GitHub, questo file
# si attiva automaticamente. È come un robot che prende
# il tuo codice, lo impacchetta e lo pubblica su Azure.
# Tu non devi fare nulla manualmente.
# =========================================================

name: Deploy NetScope to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v3

      - name: Deploy su Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend        # dove sta index.html
          api_location: /api             # dove stanno le Azure Functions
          output_location: ""
